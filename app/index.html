<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Forage</title>
    <meta name="description" content="Gather what inspires you. Find it when it matters." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#16171b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Forage" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <script>
      // Apply theme before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('forage.theme');
          var dark = saved === 'dark'; // light by default (GatherOS-style)
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
