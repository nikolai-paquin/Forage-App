<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2603f"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="40" y="58" font-size="30" font-weight="700" fill="#16171b">The Forage Loop</text>
  <text x="40" y="90" font-size="15" fill="#6f685d">Organized around a loop, not a folder tree.</text>

  <!-- cards -->
  <!-- 1 Capture -->
  <g>
    <rect x="40" y="150" width="250" height="140" rx="18" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/>
    <circle cx="72" cy="186" r="17" fill="#16171b"/>
    <text x="72" y="192" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="102" y="192" font-size="20" font-weight="700" fill="#16171b">Capture</text>
    <text x="64" y="232" font-size="13.5" fill="#6f685d">Paste, drag, or share</text>
    <text x="64" y="252" font-size="13.5" fill="#6f685d">anything straight in.</text>
  </g>
  <!-- 2 Organize -->
  <g>
    <rect x="330" y="150" width="250" height="140" rx="18" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/>
    <circle cx="362" cy="186" r="17" fill="#16171b"/>
    <text x="362" y="192" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="392" y="192" font-size="20" font-weight="700" fill="#16171b">Organize</text>
    <text x="354" y="232" font-size="13.5" fill="#6f685d">Collections, moodboards,</text>
    <text x="354" y="252" font-size="13.5" fill="#6f685d">palettes &amp; kits.</text>
  </g>
  <!-- 3 Resurface -->
  <g>
    <rect x="620" y="150" width="250" height="140" rx="18" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/>
    <circle cx="652" cy="186" r="17" fill="#16171b"/>
    <text x="652" y="192" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="682" y="192" font-size="20" font-weight="700" fill="#16171b">Resurface</text>
    <text x="644" y="232" font-size="13.5" fill="#6f685d">Search, color &amp;</text>
    <text x="644" y="252" font-size="13.5" fill="#6f685d">&#8220;find by vibe.&#8221;</text>
  </g>
  <!-- 4 Make -->
  <g>
    <rect x="910" y="150" width="250" height="140" rx="18" fill="#16171b"/>
    <circle cx="942" cy="186" r="17" fill="#ffffff"/>
    <text x="942" y="192" font-size="16" font-weight="700" fill="#16171b" text-anchor="middle">4</text>
    <text x="972" y="192" font-size="20" font-weight="700" fill="#ffffff">Make</text>
    <text x="934" y="232" font-size="13.5" fill="#cfc7ba">Pull it all into</text>
    <text x="934" y="252" font-size="13.5" fill="#cfc7ba">the work.</text>
  </g>

  <!-- forward arrows -->
  <line x1="296" y1="220" x2="324" y2="220" stroke="#c2603f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="586" y1="220" x2="614" y2="220" stroke="#c2603f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="876" y1="220" x2="904" y2="220" stroke="#c2603f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- return loop -->
  <path d="M1035 296 C 1035 430, 1035 470, 600 470 C 165 470, 165 430, 165 302"
        fill="none" stroke="#c2603f" stroke-width="2.5" stroke-dasharray="2 0" marker-end="url(#arrow)"/>
  <text x="600" y="463" font-size="13.5" fill="#c2603f" text-anchor="middle" font-weight="600">…and back again</text>
</svg>
