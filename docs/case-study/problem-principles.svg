<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="1180" height="760" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"><rect width="1180" height="760" fill="#ffffff"/><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9a9387"/></marker><marker id="ara" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c2603f"/></marker></defs><text x="40" y="52" font-size="30" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">From problem to product</text><text x="40" y="82" font-size="15" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Every feature traces back to a principle, and every principle to the problem.</text><text x="64" y="164" font-size="13" fill="#c24f6f" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">THE PROBLEM</text><rect x="40" y="180" width="350" height="520" rx="18" fill="#faf9f6" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="70" cy="221" r="4" fill="#c24f6f"/><text x="88" y="226" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Inspiration scatters across tabs,</text><text x="88" y="248" font-size="14.5" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">screenshots &amp; 5 apps</text><circle cx="70" cy="299" r="4" fill="#c24f6f"/><text x="88" y="304" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">“I’ll come back to this” — you</text><text x="88" y="326" font-size="14.5" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">never do</text><circle cx="70" cy="377" r="4" fill="#c24f6f"/><text x="88" y="382" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Tools are built for hoarding, not</text><text x="88" y="404" font-size="14.5" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">making</text><line x1="393.0" y1="430" x2="417.0" y2="430" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><text x="444" y="164" font-size="13" fill="#c2603f" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">PRINCIPLES</text><rect x="420" y="180" width="350" height="520" rx="18" fill="#faf9f6" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="450" cy="221" r="4" fill="#c2603f"/><text x="468" y="226" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Calm — the work is the hero</text><circle cx="450" cy="277" r="4" fill="#c2603f"/><text x="468" y="282" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Fast — capture in two keystrokes</text><circle cx="450" cy="333" r="4" fill="#c2603f"/><text x="468" y="338" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Local-first — it’s yours, offline</text><circle cx="450" cy="389" r="4" fill="#c2603f"/><text x="468" y="394" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Beautiful by default</text><line x1="773.0" y1="430" x2="797.0" y2="430" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><text x="824" y="164" font-size="13" fill="#6b8f71" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">HOW IT SHOWS UP</text><rect x="800" y="180" width="350" height="520" rx="18" fill="#faf9f6" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="830" cy="221" r="4" fill="#6b8f71"/><text x="848" y="226" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Two-keystroke capture, auto-detect</text><circle cx="830" cy="277" r="4" fill="#6b8f71"/><text x="848" y="282" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Masonry that’s a pleasure to</text><text x="848" y="304" font-size="14.5" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">scroll</text><circle cx="830" cy="355" r="4" fill="#6b8f71"/><text x="848" y="360" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Moodboards, kits &amp; color browse</text><circle cx="830" cy="411" r="4" fill="#6b8f71"/><text x="848" y="416" font-size="14.5" fill="#16171b" font-weight="600" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Themes, on-device library, .zip</text><text x="848" y="438" font-size="14.5" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">export</text></svg>