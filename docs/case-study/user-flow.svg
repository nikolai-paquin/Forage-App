<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" width="1200" height="860" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"><rect width="1200" height="860" fill="#ffffff"/><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9a9387"/></marker><marker id="ara" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c2603f"/></marker></defs><text x="40" y="52" font-size="30" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Primary user flow — capture → creation</text><text x="40" y="82" font-size="15" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">From a found thing to a finished moodboard, with as little friction as possible.</text><rect x="450.0" y="120" width="300" height="78" rx="16" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="474.0" cy="150" r="5" fill="#c2603f"/><text x="490.0" y="154" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Capture</text><text x="472.0" y="178" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Paste · drag · browser ext · share sheet</text><line x1="600" y1="198" x2="600" y2="238" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><text x="614" y="232" font-size="12.5" fill="#9a9387" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">auto-detects type, palette, source</text><rect x="450.0" y="238" width="300" height="78" rx="16" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="474.0" cy="268" r="5" fill="#4f6d8c"/><text x="490.0" y="272" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Library</text><text x="472.0" y="296" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Everything lands here first</text><line x1="600" y1="316" x2="600" y2="356" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><polygon points="600,348.0 675.0,396 600,444.0 525.0,396" fill="#faf9f6" stroke="#16171b" stroke-width="1.5"/><text x="600" y="393" font-size="13" fill="#16171b" font-weight="700" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">File it</text><text x="600" y="411" font-size="13" fill="#16171b" font-weight="700" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">now?</text><rect x="120" y="358" width="300" height="78" rx="16" fill="#fbfaf7" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="144" cy="388" r="5" fill="#9a9387"/><text x="160" y="392" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Unfiltered inbox</text><text x="142" y="416" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Triage later — nothing gets lost</text><rect x="780" y="358" width="300" height="78" rx="16" fill="#fbfaf7" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="804" cy="388" r="5" fill="#6b8f71"/><text x="820" y="392" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Add to a collection</text><text x="802" y="416" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Tag it to a project</text><line x1="525" y1="396" x2="420" y2="396" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><text x="472.5" y="384" font-size="12.5" fill="#9a9387" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">not yet</text><line x1="675" y1="396" x2="780" y2="396" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><text x="727.5" y="384" font-size="12.5" fill="#9a9387" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">yes</text><line x1="270" y1="436" x2="270" y2="508" stroke="#9a9387" stroke-width="2"/><line x1="930" y1="436" x2="930" y2="508" stroke="#9a9387" stroke-width="2"/><line x1="270" y1="508" x2="600" y2="508" stroke="#9a9387" stroke-width="2"/><line x1="930" y1="508" x2="600" y2="508" stroke="#9a9387" stroke-width="2"/><line x1="600" y1="508" x2="600" y2="536" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><rect x="450.0" y="536" width="300" height="78" rx="16" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="474.0" cy="566" r="5" fill="#6b8f71"/><text x="490.0" y="570" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Collection</text><text x="472.0" y="594" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">A project: brief + its saves</text><line x1="600" y1="614" x2="600" y2="654" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><rect x="280" y="654" width="300" height="78" rx="16" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="304" cy="684" r="5" fill="#7a5cc2"/><text x="320" y="688" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Moodboard</text><text x="302" y="712" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Arrange on an infinite canvas</text><rect x="620" y="654" width="300" height="78" rx="16" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="644" cy="684" r="5" fill="#c24f6f"/><text x="660" y="688" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Style kit</text><text x="642" y="712" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Palette + fonts + refs → CSS</text><line x1="430" y1="654" x2="430" y2="626" stroke="#9a9387" stroke-width="2"/><line x1="770" y1="654" x2="770" y2="626" stroke="#9a9387" stroke-width="2"/><line x1="430" y1="626" x2="770" y2="626" stroke="#9a9387" stroke-width="2"/><line x1="430" y1="732" x2="430" y2="772" stroke="#9a9387" stroke-width="2"/><line x1="770" y1="732" x2="770" y2="772" stroke="#9a9387" stroke-width="2"/><line x1="430" y1="772" x2="770" y2="772" stroke="#9a9387" stroke-width="2"/><line x1="600" y1="772" x2="600" y2="800" stroke="#9a9387" stroke-width="2" marker-end="url(#arr)"/><rect x="450.0" y="772" width="300" height="78" rx="16" fill="#ffffff" stroke="#e6e1d8" stroke-width="1.5"/><circle cx="474.0" cy="802" r="5" fill="#c2603f"/><text x="490.0" y="806" font-size="16.5" fill="#16171b" font-weight="700" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">Export &amp; share</text><text x="472.0" y="830" font-size="13" fill="#6f685d" font-weight="400" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">.zip library · image · read-only link</text><path d="M750.0 811.0 C 1140 811, 1140 270, 750.0 277" fill="none" stroke="#c2603f" stroke-width="2" stroke-dasharray="2 6" marker-end="url(#ara)"/><text x="1120" y="540" font-size="12.5" fill="#c2603f" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">resurfaces in new work</text></svg>