name = "forage-ai"
main = "worker.js"
compatibility_date = "2025-01-01"

# Enables the `embed` task (semantic search) via Cloudflare Workers AI — free tier
# includes a daily allowance. Remove this block if you only want tags/prompts.
[ai]
binding = "AI"

# Optional: override the Claude model (defaults to claude-haiku-4-5-20251001).
# [vars]
# MODEL = "claude-sonnet-4-6"

# Set the API key as a secret (never commit it):
#   wrangler secret put ANTHROPIC_API_KEY
