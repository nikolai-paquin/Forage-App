name: Build macOS app

# Builds the Forage desktop app (Tauri) into a downloadable .dmg/.app on a macOS
# runner — so you can install it on your Mac without a local Rust/Xcode setup.
#
# Run it manually:  Actions → "Build macOS app" → Run workflow  → download the
# "forage-macos" artifact when it finishes (~10 min).
# Tag a release:    push a tag like v0.1.0 to also publish a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14 # Apple Silicon — matches a Mac Studio (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Generate platform icons (.icns/.ico/pngs from icon.png)
        working-directory: app
        run: npm run tauri icon src-tauri/icons/icon.png

      - name: Build the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing + notarization. If these repo secrets are unset, Tauri
          # builds UNSIGNED (the workflow still works) — set them to get a
          # signed, notarized .dmg that opens with no Gatekeeper warning.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          args: --target aarch64-apple-darwin
          # On a tag push, also create a GitHub Release with the bundles attached.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Forage {0}', github.ref_name) || '' }}
          releaseDraft: false
          releaseBody: |
            ### Install (macOS)
            This build is **unsigned** (no paid Apple Developer certificate), so on first
            open macOS warns it's from an "unidentified developer." The app is safe — to open it:

            1. Open the `.dmg` and drag **Forage** into **Applications**.
            2. **Right-click (Control-click) Forage → Open**, then click **Open**. One-time only.
               - Still blocked? **System Settings → Privacy & Security → Open Anyway**.
               - Or in Terminal: `xattr -cr /Applications/Forage.app`, then open normally.

      - name: Upload app as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forage-macos
          if-no-files-found: error
          path: |
            app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
